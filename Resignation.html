<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统维护中</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        
        p {
            line-height: 1.6;
            margin-bottom: 25px;
            color: #666;
        }
        
        .info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
        }
        
        .time {
            font-weight: bold;
            color: #2c3e50;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚧 系统维护中</h1>
        <p>当前页面正在进行计划维护，我们正在努力优化系统，为您提供更好的服务。</p>
        
        <div class="info">
            <strong>维护内容：</strong><br>
            • 系统性能优化<br>
            • 安全更新<br>
            • 功能改进
        </div>
        
        <p>给您带来的不便，我们深表歉意。</p>
        
        <div class="time">
            预计恢复时间：2026年5月1日 08:00
        </div>
    </div>
</body>
</html>
